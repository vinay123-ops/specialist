services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      - POSTGRES_USER=enthusiast
      - POSTGRES_PASSWORD=enthusiast
      - POSTGRES_DB=enthusiast
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    restart: always

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    ports:
      - "10000:10000"
    env_file:
      - ./server/.env
    environment:
      - PORT=10000
      - RUN_MIGRATIONS=True
      - RUN_WORKER=False
      - RUN_BEAT=False
    volumes:
      - static_data:/app/static
      - media_data:/app/media
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    user: celery
    env_file:
      - ./server/.env
    environment:
      - RUN_MIGRATIONS=False
      - RUN_WORKER=True
      - RUN_BEAT=False
    volumes:
      - media_data:/app/media
    depends_on:
      - redis
      - postgres

  beat:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: always
    user: celery
    command: celery -A pecl.celery beat --loglevel=info -s /tmp/celerybeat-schedule
    environment:
      - RUN_MIGRATIONS=False
      - RUN_WORKER=False
      - RUN_BEAT=True
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PORT=10001
        # CRITICAL: These must point to your actual domain
        - VITE_API_BASE=https://specialist.getechsolutions.com
        - VITE_WS_BASE=wss://specialist.getechsolutions.com
    restart: always
    ports:
      - "10001:10001"

volumes:
  postgres_data:
  static_data:
  media_data: